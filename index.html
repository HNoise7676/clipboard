<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#7b5e42">
    <link rel="manifest" href="manifest.json">

    <title>MDM Field Clipboard</title>
    <style>
        :root {
            --board: #7b5e42; 
            --paper: #fdfdfd;
            --clip: #b0b0b0;
            --accent: #d9534f; 
            --text: #333;
            --instruction: #666;
        }

        body { 
            background-color: #1a1c1e; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            /* Prevents weird bouncing on mobile */
            overflow-x: hidden;
        }

        .clipboard {
            background: var(--board);
            width: 100%;
            max-width: 480px;
            padding: 60px 15px 20px 15px;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            box-sizing: border-box;
            margin-top: 20px;
        }

        .clipboard::before {
            content: "";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 50px;
            background: linear-gradient(to bottom, #e0e0e0, #999);
            border-radius: 4px;
            z-index: 2;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

        .paper {
            background: var(--paper);
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 24px 24px;
            padding: 25px;
            min-height: 550px;
            box-shadow: 2px 2px 15px rgba(0,0,0,0.3);
            color: var(--text);
            box-sizing: border-box;
        }

        h2 { 
            text-align: center; 
            margin: 0 0 15px 0; 
            color: var(--accent); 
            border-bottom: 3px double var(--accent);
            padding-bottom: 5px;
            font-size: 1.3rem;
        }

        .instructions {
            background: #f1f1f1;
            padding: 10px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            font-size: 0.75rem;
            color: var(--instruction);
            line-height: 1.3;
        }

        label { 
            display: block; 
            margin: 20px 0 5px; 
            font-weight: bold; 
            font-size: 0.8rem; 
            text-transform: uppercase;
        }

        input, textarea { 
            width: 100%; 
            padding: 10px; 
            border: none; 
            border-bottom: 1px dashed #aaa; 
            background: transparent; 
            color: #111; 
            box-sizing: border-box; 
            font-family: inherit;
            font-size: 1rem;
            /* REMOVE RESIZE ABILITY */
            resize: none; 
        }

        textarea { border: 1px dashed #aaa; margin-top: 5px; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 30px; }
        
        button { 
            flex: 1; 
            padding: 12px; 
            border: 2px solid #444; 
            background: #fff; 
            cursor: pointer; 
            font-family: inherit; 
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        button.primary { background: var(--accent); color: white; border-color: #8e2825; }
        
        .copy-hint { 
            text-align: center; 
            font-size: 0.85rem; 
            margin-top: 15px; 
            color: #2d7a5a; 
            font-weight: bold; 
            opacity: 0; 
        }

        /* Mobile Adjustments */
        @media (max-width: 400px) {
            .paper { padding: 15px; }
            h2 { font-size: 1.1rem; }
            .clipboard::before { width: 100px; }
        }
    </style>
</head>
<body>

<div class="clipboard">
    <div class="paper">
        <h2>MDM FIELD MEDIC REPORT</h2>
        
        <div class="instructions">
            <b>NOTICE:</b> Vibe-coded. Things may break.<br>
            <b>FORMATTING:</b> Use <b>"-"</b> for lists.
        </div>

        <label>Patient Identity</label>
        <input type="text" id="patientName" placeholder="ENTER NAME..." oninput="autoSave()">

        <label>Clinical Observations</label>
        <textarea id="notes" rows="10" placeholder="- item one&#10;- item two" oninput="autoSave()"></textarea>

        <div class="btn-group">
            <button class="primary" onclick="generateAndCopy()">SIGN & COPY</button>
            <button onclick="clearForm()">VOID</button>
        </div>
        
        <p id="hint" class="copy-hint">✓ COPIED</p>
    </div>
</div>

<script>
    window.onload = () => {
        if (localStorage.getItem('mdm_patient')) document.getElementById('patientName').value = localStorage.getItem('mdm_patient');
        if (localStorage.getItem('mdm_notes')) document.getElementById('notes').value = localStorage.getItem('mdm_notes');
    };

    function autoSave() {
        localStorage.setItem('mdm_patient', document.getElementById('patientName').value);
        localStorage.setItem('mdm_notes', document.getElementById('notes').value);
    }

    function getFormattedTime() {
        const now = new Date();
        const dateStr = `${now.getDate()}-${now.getMonth() + 1}-${now.getFullYear()}`;
        const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }).toLowerCase();
        try {
            const tzStr = new Intl.DateTimeFormat('en-US', { timeZoneName: 'short' }).formatToParts(now).find(p => p.type === 'timeZoneName').value;
            return `${dateStr} at ${timeStr} (${tzStr})`;
        } catch(e) { return `${dateStr} at ${timeStr}`; }
    }

    function generateAndCopy() {
        const name = document.getElementById('patientName').value.trim() || "Unknown Subject";
        const notes = document.getElementById('notes').value.trim() || "- No notes recorded.";
        const time = getFormattedTime();
        const markdown = `# ${name}\n**Logged:** ${time}\n\n**Notes:**\n${notes}`;

        navigator.clipboard.writeText(markdown).then(() => {
            const hint = document.getElementById('hint');
            hint.style.opacity = '1';
            setTimeout(() => { hint.style.opacity = '0'; }, 3000);
        });
    }

    function clearForm() {
        if (confirm("VOID this record?")) {
            document.getElementById('patientName').value = '';
            document.getElementById('notes').value = '';
            localStorage.clear();
        }
    }
</script>
</body>
</html>
