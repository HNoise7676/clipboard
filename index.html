<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDM Field Clipboard</title>
    <style>
        :root {
            --board: #7b5e42; /* Wood color */
            --paper: #fdfdfd;
            --clip: #b0b0b0;
            --accent: #d9534f; /* Medical Red */
            --text: #333;
        }

        body { 
            background-color: #2c2f33; 
            display: flex; 
            justify-content: center; 
            padding: 40px 20px;
            font-family: 'Courier New', Courier, monospace; /* Typewriter feel */
        }

        /* The Wooden Board */
        .clipboard {
            background: var(--board);
            width: 100%;
            max-width: 450px;
            padding: 60px 20px 20px 20px;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* The Metal Clip */
        .clipboard::before {
            content: "";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 50px;
            background: linear-gradient(to bottom, #d1d1d1, #888);
            border-radius: 5px;
            z-index: 2;
            box-shadow: 0 4px 5px rgba(0,0,0,0.3);
        }

        /* The Paper */
        .paper {
            background: var(--paper);
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 20px 20px; /* Subtle grid/dots */
            padding: 30px;
            min-height: 500px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            color: var(--text);
        }

        h2 { 
            text-align: center; 
            margin-top: 0; 
            color: var(--accent); 
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            font-weight: bold;
        }

        label { 
            display: block; 
            margin: 20px 0 5px; 
            font-weight: bold; 
            font-size: 0.9rem; 
            text-transform: uppercase;
        }

        input, textarea { 
            width: 100%; 
            padding: 10px; 
            border: none; 
            border-bottom: 1px dashed #999; 
            background: transparent; 
            color: #222; 
            box-sizing: border-box; 
            font-family: inherit;
            font-size: 1.1rem;
        }

        input:focus, textarea:focus { outline: none; border-bottom: 1px solid var(--accent); }

        .btn-group { display: flex; gap: 10px; margin-top: 40px; }
        
        button { 
            flex: 1; 
            padding: 12px; 
            border: 2px solid #555; 
            background: #eee; 
            cursor: pointer; 
            font-family: inherit; 
            font-weight: bold;
            transition: 0.2s;
        }

        button.primary { background: var(--accent); color: white; border-color: #a9322d; }
        button:hover { filter: brightness(0.9); transform: translateY(-1px); }
        
        .copy-hint { 
            text-align: center; 
            font-size: 0.8rem; 
            margin-top: 15px; 
            color: #43b581; 
            font-weight: bold; 
            opacity: 0; 
        }
    </style>
</head>
<body>

<div class="clipboard">
    <div class="paper">
        <h2>MEDICAL REPORT</h2>
        
        <label>Patient Name</label>
        <input type="text" id="patientName" placeholder="NAME HERE..." oninput="autoSave()">

        <label>Clinical Notes</label>
        <textarea id="notes" rows="12" placeholder="- observations&#10;- symptoms" oninput="autoSave()"></textarea>

        <div class="btn-group">
            <button class="primary" onclick="generateAndCopy()">COPY RECORD</button>
            <button onclick="clearForm()">CLEAR</button>
        </div>
        
        <p id="hint" class="copy-hint">RECORD SIGNED & COPIED</p>
    </div>
</div>

<script>
    // Load data from memory
    window.onload = () => {
        if (localStorage.getItem('mdm_patient')) document.getElementById('patientName').value = localStorage.getItem('mdm_patient');
        if (localStorage.getItem('mdm_notes')) document.getElementById('notes').value = localStorage.getItem('mdm_notes');
    };

    function autoSave() {
        localStorage.setItem('mdm_patient', document.getElementById('patientName').value);
        localStorage.setItem('mdm_notes', document.getElementById('notes').value);
    }

    function getFormattedTime() {
        const now = new Date();
        const dateStr = `${now.getDate()}-${now.getMonth() + 1}-${now.getFullYear()}`;
        const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }).toLowerCase();
        const tzStr = new Intl.DateTimeFormat('en-US', { timeZoneName: 'short' }).formatToParts(now).find(p => p.type === 'timeZoneName').value;
        return `${dateStr} at ${timeStr} (${tzStr})`;
    }

    function generateAndCopy() {
        const name = document.getElementById('patientName').value.trim() || "Unknown Patient";
        const notes = document.getElementById('notes').value.trim();
        const time = getFormattedTime();
        
        const markdown = `# ${name}\n**Logged:** ${time}\n\n**Notes:**\n${notes}`;

        navigator.clipboard.writeText(markdown).then(() => {
            const hint = document.getElementById('hint');
            hint.style.opacity = '1';
            setTimeout(() => { hint.style.opacity = '0'; }, 2000);
        });
    }

    function clearForm() {
        if (confirm("Destroy this record?")) {
            document.getElementById('patientName').value = '';
            document.getElementById('notes').value = '';
            localStorage.clear();
        }
    }
</script>

</body>
</html>
